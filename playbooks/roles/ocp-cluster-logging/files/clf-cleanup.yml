---
- name: Cleanup logging resources
  block:
    - name: Delete log files and directories if they exist
      file:
        state: absent
        path: /root/clf_logs/

    - name: Delete ansible playbook log file
      file:
        state: absent
        path: /root/ocp_ansible_validation_log.txt

    - name: Set disableAllDefaultSources to false
      shell: |
        oc patch operatorhub.config.openshift.io/cluster -p='{"spec":{"disableAllDefaultSources":false}}' --type=merge

    - name: Define CatalogSources to cleanup
      set_fact:
        catalog_sources_to_cleanup:
          - cluster-logging
          - elasticsearch
          - loki

    - name: Delete CatalogSources if they exist
      kubernetes.core.k8s:
        state: absent
        api_version: operators.coreos.com/v1alpha1
        kind: CatalogSource
        name: "{{ item }}"
        namespace: openshift-marketplace
        wait: yes
      loop: "{{ catalog_sources_to_cleanup }}"
      loop_control:
        label: "{{ item }}"
      ignore_errors: yes

    - name: Delete ClusterLogForwarder instance
      kubernetes.core.k8s:
        state: absent
        api_version: observability.openshift.io/v1
        kind: ClusterLogForwarder
        name: collector
        namespace: openshift-logging
        wait: yes

    - name: Delete ClusterLogging instance
      kubernetes.core.k8s:
        state: absent
        api_version: logging.openshift.io/v1
        kind: ClusterLogging
        name: instance
        namespace: openshift-logging
        wait: yes
      ignore_errors: yes

    # Check Lokistack instance and delete if it exists
    - name: Get LokiStack instances
      kubernetes.core.k8s_info:
        api_version: loki.grafana.com/v1
        kind: LokiStack
        namespace: openshift-logging
      register: lokistack_info

    - name: Delete LokiStack instances
      kubernetes.core.k8s:
        state: absent
        api_version: loki.grafana.com/v1
        kind: LokiStack
        name: "{{ item.metadata.name }}"
        namespace: openshift-logging
        wait: yes
      loop: "{{ lokistack_info.resources | default([]) }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      when: lokistack_info.resources | length > 0

    - name: Wait for LokiStack deletion
      kubernetes.core.k8s_info:
        api_version: loki.grafana.com/v1
        kind: LokiStack
        name: "{{ item.metadata.name }}"
        namespace: openshift-logging
      register: loki_check
      until: loki_check.resources | length == 0
      retries: 20
      delay: 10
      loop: "{{ lokistack_info.resources | default([]) }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Delete the logcollector service account
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: ServiceAccount
        name: logcollector
        namespace: openshift-logging

    - name: Define operators to cleanup
      set_fact:
        operators_to_cleanup:
          - { name: elasticsearch-operator, namespace: openshift-operators-redhat }
          - { name: cluster-logging, namespace: openshift-logging }
          - { name: loki-operator, namespace: openshift-operators-redhat }

    - name: Get ClusterServiceVersions
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: "{{ item.namespace }}"
      register: csv_info
      loop: "{{ operators_to_cleanup }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Get CSVs to be deleted
      set_fact:
        csvs_to_delete: >-
          {{
            csv_info.results
            | map(attribute='resources')
            | flatten
            | selectattr(
                'metadata.name',
                'search',
                operators_to_cleanup | map(attribute='name') | join('|')
              )
            | list
          }}

    - name: Delete ClusterServiceVersions
      kubernetes.core.k8s:
        state: absent
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{ item.metadata.name }}"
        namespace: "{{ item.metadata.namespace }}"
      loop: "{{ csvs_to_delete }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      ignore_errors: yes

    - name: Wait for CSV deletion
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        name: "{{ item.metadata.name }}"
        namespace: "{{ item.metadata.namespace }}"
      register: csv_check
      until: csv_check.resources | length == 0
      retries: 20
      delay: 10
      loop: "{{ csvs_to_delete }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Check if Subscriptions exist
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        namespace: "{{ item.namespace }}"
      register: subs_info
      loop: "{{ operators_to_cleanup }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Delete Subscriptions
      kubernetes.core.k8s:
        state: absent
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: "{{ item.metadata.name }}"
        namespace: "{{ item.metadata.namespace }}"
      ignore_errors: yes
      loop: "{{ subs_info.results | map(attribute='resources') | flatten }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      when: item is defined and item.metadata.name is defined

    # Delete the Operator groups
    - name: Delete CLO and Loki OperatorGroups
      kubernetes.core.k8s:
        state: absent
        api_version: operators.coreos.com/v1
        kind: OperatorGroup
        name: "{{ item.name }}"
        namespace: "{{ item.namespace }}"
      ignore_errors: yes
      loop:
        - { name: cluster-logging, namespace: openshift-logging }
        - { name: openshift-operators-redhat, namespace: openshift-operators-redhat }
      loop_control:
        label: "{{ item.name }}"

    - name: Wait for OperatorGroup deletion
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1
        kind: OperatorGroup
        name: "{{ item.name }}"
        namespace: "{{ item.namespace }}"
      register: result
      until: result.resources | length == 0
      retries: 10
      delay: 5
      loop:
        - { name: cluster-logging, namespace: openshift-logging }
        - { name: openshift-operators-redhat, namespace: openshift-operators-redhat }
      loop_control:
        label: "{{ item.name }}"

    - name: Delete ImageContentSourcePolicy instance
      kubernetes.core.k8s:
        state: absent
        api_version: operator.openshift.io/v1alpha1
        kind: ImageContentSourcePolicy
        name: brew-registry

    - name: Delete ImageDigestMirrorSet instance
      kubernetes.core.k8s:
        state: absent
        api_version: config.openshift.io/v1
        kind: ImageDigestMirrorSet
        name: fbc-clo-testing-idms
  when: clf_clean_up